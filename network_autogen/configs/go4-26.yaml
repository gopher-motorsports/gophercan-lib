        {name: batteryCurrent_FL_A,  start: 2, length: 2}

      ]
    },

    # General Data 3 (FL)
    {
      id: 0x441,
      parameters: [
        {name: controllerTemp_FL_C,    start: 0, length: 2},
        {name: motorTemp_FL_C,         start: 2, length: 2},
        {name: faultCode_FL,           start: 4, length: 1}

      ]
    },

    # General Data 4 (FL)
